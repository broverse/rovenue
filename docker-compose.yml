# Rovenue local stack — rovenue's own services (api, db, redis,
# clickhouse, redpanda, redpanda-console).
#
# Default boot:
#   docker compose up -d
#
# Analytics ingestion runs on an outbox + Kafka pipeline:
# app writes outbox_events in the same tx as the OLTP write, the
# outbox-dispatcher worker (apps/api/src/workers/outbox-dispatcher.ts)
# drains it into Redpanda, and ClickHouse's Kafka Engine consumes
# the topic. No CDC. See docs/superpowers/specs/2026-04-20-tech-stack-upgrade/06-clickhouse.md §14.
services:
  # One-shot migration runner. Applies Drizzle (Postgres) then
  # ClickHouse migrations, then exits 0. api + workers gate on its
  # successful completion so nothing serves an un-migrated schema.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rovenue}:${POSTGRES_PASSWORD:-rovenue}@db:5432/${POSTGRES_DB:-rovenue}
      CLICKHOUSE_URL: http://clickhouse:8123
    command:
      - sh
      - -c
      - >
        pnpm --filter @rovenue/db db:migrate &&
        pnpm --filter @rovenue/db db:clickhouse:migrate
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rovenue}:${POSTGRES_PASSWORD:-rovenue}@db:5432/${POSTGRES_DB:-rovenue}
      REDIS_URL: redis://redis:6379
      PORT: 3000
      # Internal port serves the Caddy on-demand-TLS ask endpoint. NOT
      # published in `ports:` — only reachable inside the docker network.
      INTERNAL_PORT: 3001
      CANONICAL_HOSTS: ${CANONICAL_HOSTS:-rovenue.io,edge.rovenue.io,app.rovenue.io}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: rovenue_reader
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_READER_PASSWORD:-rovenue}
      KAFKA_BROKERS: redpanda:9092
      APPLE_ROOT_CERTS_DIR: /etc/rovenue/apple-certs
      # Single-dispatcher contract: the dedicated `dispatcher` service
      # is the only outbox→Kafka publisher. The API MUST keep this
      # false so it can scale to N replicas without double-dispatching.
      # See docs/architecture/outbox-dispatcher.md.
      OUTBOX_DISPATCHER_ENABLED: "false"
    volumes:
      - ${APPLE_ROOT_CERTS_HOST_DIR:-./deploy/apple-certs}:/etc/rovenue/apple-certs:ro
    ports:
      # Only the public port is mapped to the host. 3001 stays
      # docker-network-only so Caddy is the only thing that can hit it.
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    # The dispatcher no longer runs in-process here, so the API is now
    # stateless and horizontally scalable — raise this to fan out behind
    # the edge Caddy. The remaining in-process workers are all BullMQ
    # jobId-idempotent (or FOR UPDATE SKIP LOCKED), safe across replicas.
    deploy:
      replicas: ${API_REPLICAS:-1}

  # The single outbox→Kafka publisher. MUST stay at one replica:
  # delivery is at-least-once, so a second dispatcher would merely
  # re-publish (collapsed downstream by the 0012 idempotent CH views)
  # and waste load. Runs the same image as `api` with a dispatcher-only
  # entrypoint; no HTTP server, no public ports.
  dispatcher:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["pnpm", "--filter", "@rovenue/api", "exec", "tsx", "src/workers/outbox-dispatcher-process.ts"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rovenue}:${POSTGRES_PASSWORD:-rovenue}@db:5432/${POSTGRES_DB:-rovenue}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
      # The dispatcher service IS the publisher. The flag is irrelevant
      # to its entrypoint (which calls runOutboxDispatcher directly) but
      # we set it true to document intent and satisfy the guard test.
      OUTBOX_DISPATCHER_ENABLED: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1

  # Caddy edge — terminates TLS, gates on-demand cert issuance through
  # the api's internal ask-endpoint. See deploy/caddy/Caddyfile for the
  # routing rules and threat model.
  #
  # First-time deploy:
  #   - Operator must point DNS for canonical hostnames at this service.
  #   - Operator must point CNAMEs for custom-domain hosts at the same.
  #   - $TLS_EMAIL is mandatory in production (Let's Encrypt account).
  #
  # The `caddy-data` volume MUST persist across deploys — losing it
  # forces full cert re-issuance and risks Let's Encrypt rate-limits.
  caddy:
    image: caddy:2-alpine
    environment:
      TLS_EMAIL: ${TLS_EMAIL:-ops@rovenue.io}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_started
      dashboard:
        condition: service_started
      docs:
        condition: service_started
    restart: unless-stopped

  # Dashboard SPA — built by apps/dashboard/Dockerfile, served as static
  # files by an in-image Caddy on :80. The edge Caddy proxies
  # app.rovenue.io here. VITE_API_URL is baked at build time and must
  # point at the PUBLIC api origin (not the docker-internal name).
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    # No published ports — only the edge Caddy reaches it on the
    # docker network. Exposed container port is 80.
    expose:
      - "80"

  # Docs site — built by apps/docs/Dockerfile, served as prerendered static
  # files. No published ports; only Caddy reaches it on the docker network.
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    restart: unless-stopped
    # No published ports — only the edge Caddy reaches it on the
    # docker network. Exposed container port is 80.
    expose:
      - "80"

  # --- Notification pipeline workers ---
  # Four separate processes, all built from the same image as `api`
  # but with different entrypoints. Splitting them up means a stuck
  # APNs session can't starve email throughput, and the digest
  # scheduler can be scaled to exactly one replica without dragging
  # the Kafka consumer along with it.
  notifier-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["pnpm", "--filter", "@rovenue/api", "exec", "tsx", "src/workers/notifier-process.ts"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rovenue}:${POSTGRES_PASSWORD:-rovenue}@db:5432/${POSTGRES_DB:-rovenue}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: rovenue_reader
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_READER_PASSWORD:-rovenue}
      # Single-dispatcher contract: only `api` runs the outbox
      # dispatcher. Workers MUST keep this false or CH aggregates
      # double-count. See docs/architecture/outbox-dispatcher.md.
      OUTBOX_DISPATCHER_ENABLED: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db: { condition: service_healthy }
      redis: { condition: service_started }
      redpanda: { condition: service_healthy }
    restart: unless-stopped

  digest-scheduler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["pnpm", "--filter", "@rovenue/api", "exec", "tsx", "src/workers/digest-scheduler-process.ts"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rovenue}:${POSTGRES_PASSWORD:-rovenue}@db:5432/${POSTGRES_DB:-rovenue}
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: rovenue_reader
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_READER_PASSWORD:-rovenue}
      # Single-dispatcher contract: only `api` runs the outbox
      # dispatcher. Workers MUST keep this false or CH aggregates
      # double-count. See docs/architecture/outbox-dispatcher.md.
      OUTBOX_DISPATCHER_ENABLED: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db: { condition: service_healthy }
      redis: { condition: service_started }
      clickhouse: { condition: service_healthy }
    # Only ever one — the BullMQ repeat-jobId guarantees idempotency
    # across replicas, but running multiple wastes per-tick work.
    deploy:
      replicas: 1
    restart: unless-stopped

  send-email-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["pnpm", "--filter", "@rovenue/api", "exec", "tsx", "src/workers/send-email-process.ts"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rovenue}:${POSTGRES_PASSWORD:-rovenue}@db:5432/${POSTGRES_DB:-rovenue}
      REDIS_URL: redis://redis:6379
      # Single-dispatcher contract: only `api` runs the outbox
      # dispatcher. Workers MUST keep this false or CH aggregates
      # double-count. See docs/architecture/outbox-dispatcher.md.
      OUTBOX_DISPATCHER_ENABLED: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  send-push-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["pnpm", "--filter", "@rovenue/api", "exec", "tsx", "src/workers/send-push-process.ts"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rovenue}:${POSTGRES_PASSWORD:-rovenue}@db:5432/${POSTGRES_DB:-rovenue}
      REDIS_URL: redis://redis:6379
      # Single-dispatcher contract: only `api` runs the outbox
      # dispatcher. Workers MUST keep this false or CH aggregates
      # double-count. See docs/architecture/outbox-dispatcher.md.
      OUTBOX_DISPATCHER_ENABLED: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  db:
    # Plan 3 §G.1 — vanilla Postgres 16 + pg_partman, replacing the
    # timescale/timescaledb:2.17.2-pg16 image. Hypertables, continuous
    # aggregates, and TSL-gated retention/compression policies are
    # gone; partitioning is declarative range (PG 11+ native) and the
    # 7-year retention is enforced via partman.run_maintenance_proc()
    # called from a BullMQ worker.
    build:
      context: ./deploy/postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rovenue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rovenue}
      POSTGRES_DB: ${POSTGRES_DB:-rovenue}
    volumes:
      - rovenue-data:/var/lib/postgresql/data
    ports:
      # Host 5433 → container 5432 so rovenue can coexist with other
      # Postgres instances bound to 5432 on the host.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rovenue}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      # Host 6380 → container 6379 so rovenue can coexist with other
      # Redis instances bound to 6379 on the host.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  clickhouse:
    # Pinned to 24.3 LTS — the oldest series that carries
    # `windowFunnel`, projections, and the @clickhouse/client 1.x wire
    # protocol we depend on. Upgrading to 24.x+ is safe within the
    # 24-series but should trigger a verify-clickhouse run.
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      # CLICKHOUSE_DB creates the rovenue database on first boot. We
      # intentionally do NOT set CLICKHOUSE_USER/CLICKHOUSE_PASSWORD —
      # the image's entrypoint would generate a second user definition
      # that conflicts with users.d/rovenue.xml ("more than one
      # 'password' field for user rovenue"). Authoritative user config
      # lives in users.d; env vars only feed the hex password via
      # from_env in the XML.
      CLICKHOUSE_DB: rovenue
      CLICKHOUSE_PASSWORD_SHA256: ${CLICKHOUSE_PASSWORD_SHA256:-460592d4be24af16128f6ee18ca9bef3527fec9d74281c13a860572d09e975c2}
      CLICKHOUSE_READER_PASSWORD_SHA256: ${CLICKHOUSE_READER_PASSWORD_SHA256:-460592d4be24af16128f6ee18ca9bef3527fec9d74281c13a860572d09e975c2}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - rovenue-clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
      - ./deploy/clickhouse/users.d:/etc/clickhouse-server/users.d:ro
    ports:
      # Host 8124 → container 8123 (HTTP). CH native-TCP (9000) is
      # not exposed — the API hits CH over HTTP via @clickhouse/client,
      # and integration tests spin their own container.
      - "8124:8123"
    healthcheck:
      # Use 127.0.0.1 instead of `localhost` — alpine's wget resolves
      # localhost to the IPv6 loopback first and CH binds IPv4 only by
      # default, so the healthcheck was failing even though the server
      # was reachable.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
      # Prometheus metrics endpoint — scraped by Grafana Alloy on the
      # docker network. NOT published to the host.
      - "9363"
    restart: unless-stopped

  redpanda:
    # Redpanda 24.2 — Kafka-wire-compatible single Go binary. Spec
    # §14.3 point 4 argues the single-node config (one container)
    # beats Kafka+ZK+Schema-Registry (≥5 containers) on ops weight
    # for a self-hosted subscription platform. Rovenue does not need
    # multi-broker durability at Plan 1 scale.
    image: redpandadata/redpanda:v24.2.13
    container_name: rovenue-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      # External (host) listener on 19092 so apps running on the
      # host (pnpm dev) connect without a docker-network round-trip.
      # Internal listener on 9092 for other compose services.
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,EXTERNAL://localhost:19092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - rovenue-redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redpanda-console:
    # Web UI for Redpanda — topic inspector, consumer-group lag,
    # message browser. Only bound to localhost in production (this
    # compose is self-host dev; Coolify operator should put it
    # behind basic auth if exposed).
    image: redpandadata/console:v2.6.1
    container_name: rovenue-redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
      SERVER_LISTENPORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rovenue-data:
  rovenue-clickhouse-data:
  rovenue-redpanda-data:
  caddy-data:
  caddy-config:
