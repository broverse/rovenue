services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rovenue}:${POSTGRES_PASSWORD:-rovenue}@db:5432/${POSTGRES_DB:-rovenue}
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    # TimescaleDB is a Postgres 16 extension distribution — drop-in
    # replacement for postgres:16-alpine with the hypertable /
    # continuous aggregate / compression extensions preloaded. Vanilla
    # Postgres clients and Prisma keep working against the same wire
    # protocol; the timescaledb extension is opted into per-database
    # via `CREATE EXTENSION timescaledb` in migrations/.
    image: timescale/timescaledb:2.17.2-pg16
    # TimescaleDB license runs at the default `timescale` (TSL) value.
    # Rovenue uses continuous aggregates (daily_mrr), compression
    # policies, and the background-job scheduler for retention — all
    # TSL-gated in 2.17.2. Dropping to `apache` disables those and
    # breaks Tasks 5.1/6.1/7.1. TSL's only restriction is "don't offer
    # TimescaleDB itself as a managed DB service"; Rovenue is a
    # subscription-management application, not a DBaaS, so we're safely
    # inside TSL's permitted self-host use case.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rovenue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rovenue}
      POSTGRES_DB: ${POSTGRES_DB:-rovenue}
    volumes:
      - rovenue-data:/var/lib/postgresql/data
    ports:
      # Host 5433 → container 5432 so rovenue can coexist with other
      # Postgres instances bound to 5432 on the host.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rovenue}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      # Host 6380 → container 6379 so rovenue can coexist with other
      # Redis instances bound to 6379 on the host.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  rovenue-data:
