# Lints packages/sdk-swift/Rovenue.podspec on any PR that touches the
# sdk-swift package or this workflow.
#
# Expected to FAIL on the M7.1 merge PR itself (no GitHub Release exists
# yet for the `:http` source URL to resolve). After M7.1 lands, the
# operator runs `packages/sdk-swift/scripts/release-pod.sh` once, which
# creates the release and patches the podspec sha256; subsequent PRs lint
# green.
#
# --platforms=ios restricts lint to iOS device platform (skips simulator,
# which would fail until M7.1 Open Question 1 — XCFramework — is solved).

name: sdk-swift pod lint

on:
  pull_request:
    paths:
      - 'packages/sdk-swift/**'
      - '.github/workflows/sdk-swift-pod-lint.yml'

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: pod spec lint
        run: pod spec lint packages/sdk-swift/Rovenue.podspec --allow-warnings --skip-tests --platforms=ios
