name: SDK

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/core-rs/**"
      - "packages/sdk-swift/**"
      - "packages/sdk-kotlin/**"
      - "packages/sdk-rn/**"
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/sdk.yml"

jobs:
  rust-core:
    name: Rust core (test + fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets

  bindgen-host:
    name: UniFFI bindgen (host)
    runs-on: ubuntu-latest
    needs: rust-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
      - uses: Swatinem/rust-cache@v2
      - run: ./packages/core-rs/scripts/build-bindings.sh
      - name: Confirm Swift binding emitted
        run: ls packages/sdk-swift/Sources/Rovenue/Generated/RovenueFFI.swift
      - name: Confirm Kotlin binding emitted
        run: ls packages/sdk-kotlin/src/main/kotlin/dev/rovenue/sdk/generated/librovenue.kt
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-linux
          path: |
            packages/sdk-swift/Sources/Rovenue/Generated
            packages/sdk-kotlin/src/main/kotlin/dev/rovenue/sdk/generated
            target/release/librovenue.so

  swift:
    name: Swift façade
    runs-on: macos-14
    needs: bindgen-host
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
      - uses: Swatinem/rust-cache@v2
      - run: ./packages/core-rs/scripts/build-bindings.sh
      - name: swift test
        working-directory: packages/sdk-swift
        run: |
          export DYLD_LIBRARY_PATH="$GITHUB_WORKSPACE/target/release"
          swift test

  kotlin:
    name: Kotlin façade (JVM)
    runs-on: ubuntu-latest
    needs: bindgen-host
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
      - run: ./packages/core-rs/scripts/build-bindings.sh
      - name: gradle test
        working-directory: packages/sdk-kotlin
        run: gradle test --no-daemon

  rn:
    name: RN façade (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @rovenue/sdk-rn test
      - run: pnpm --filter @rovenue/sdk-rn build
